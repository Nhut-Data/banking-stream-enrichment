version: 2

sources:
  - name: berka
    database: banking-data-platform-500108
    schema: berka_raw
    description: "Berka PKDD99 banking dataset — loaded from Postgres via CSV export"
    tables:
      - name: trans
        columns:
          - name: trans_id
            data_tests: [not_null]
          - name: account_id
            data_tests: [not_null]
          - name: amount
            data_tests: [not_null]
      - name: account
        columns:
          - name: account_id
            data_tests: [not_null, unique]
      - name: client
        columns:
          - name: client_id
            data_tests: [not_null, unique]
      - name: disposition
        columns:
          - name: disp_id
            data_tests: [not_null, unique]
      - name: district
        columns:
          - name: district_id
            data_tests: [not_null, unique]
