# dbt/models/staging/berka/_berka__sources.yml
version: 2

sources:
  - name: berka
    database: berka
    schema: public
    description: "Berka PKDD99 banking dataset — core banking simulation"
    tables:
      - name: trans
        description: "Giao dịch ngân hàng — volume cao, CDC tracked"
        columns:
          - name: trans_id
            description: "Primary key"
            data_tests:
              - not_null
          - name: account_id
            description: "FK sang bảng account (không có DB constraint — intentional)"
            data_tests:
              - not_null
          - name: amount
            data_tests:
              - not_null

      - name: account
        description: "Tài khoản ngân hàng"
        columns:
          - name: account_id
            data_tests:
              - not_null
              - unique

      - name: client
        description: "Thông tin khách hàng"
        columns:
          - name: client_id
            data_tests:
              - not_null
              - unique

      - name: disposition
        description: "Liên kết client <-> account"
        columns:
          - name: disp_id
            data_tests:
              - not_null
              - unique

      - name: district
        description: "Thông tin demographic khu vực"
        columns:
          - name: district_id
            data_tests:
              - not_null
              - unique